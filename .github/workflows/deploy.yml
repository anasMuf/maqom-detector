name: Deploy to VPS

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: anasmuf/maqom-detector

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:latest

      - name: Build and push Analyzer
        uses: docker/build-push-action@v5
        with:
          context: ./apps/analyzer
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/analyzer:latest

      - name: Build and push Platform
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/platform/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=https://api.maqom.anaslabs.my.id
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/platform:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/maqom-detector
            # Login to GHCR on VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Pull and Restart
            docker-compose pull
            docker-compose up -d
            # Cleanup old images
            docker image prune -f
