
<style>
#erd { padding: 8px 0; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2C2C2A' : '#F1EFE8',
    primaryBorderColor: dark ? '#5F5E5A' : '#B4B2A9',
    attributeBackgroundColorEven: dark ? '#26215C' : '#EEEDFE',
    attributeBackgroundColorOdd: dark ? '#1a1a18' : '#ffffff',
  },
});
const diagram = `erDiagram
  sessions {
    uuid id PK
    timestamp created_at
    timestamp last_active_at
  }
  maqamat {
    string id PK "slug: hijaz, rast"
    string name_arabic
    string name_latin
    string name_indonesia
    jsonb pitch_class_profile "24 bins float[]"
    jsonb emotion_tags "string[]"
    jsonb example_songs "string[]"
    text interval_description
    timestamp updated_at
  }
  analyses {
    uuid id PK
    uuid session_id FK
    enum input_type "youtube|upload|microphone|humming"
    text input_source "url or filename"
    string detected_maqam_id FK "nullable"
    float confidence_score
    text explanation_text
    enum status "pending|processing|completed|failed"
    int processing_ms
    text error_message "nullable"
    timestamp created_at
  }
  analysis_candidates {
    uuid id PK
    uuid analysis_id FK
    string maqam_id FK
    float confidence_score
    int rank "1, 2, or 3"
  }

  sessions ||--o{ analyses : "menghasilkan"
  maqamat ||--o{ analyses : "terdeteksi pada"
  analyses ||--o{ analysis_candidates : "memiliki"
  maqamat ||--o{ analysis_candidates : "dirujuk oleh"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
</script>
