# ─── Redirect HTTP → HTTPS ─────────────────────────
server {
    listen 80;
    server_name maqom.anaslabs.my.id api.maqom.anaslabs.my.id;
    return 301 https://$host$request_uri;
}

# ─── Frontend (Platform) ──────────────────────────
server {
    listen 443 ssl;
    server_name maqom.anaslabs.my.id;

    ssl_certificate /etc/letsencrypt/live/maqom.anaslabs.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maqom.anaslabs.my.id/privkey.pem;

    location / {
        proxy_pass http://localhost:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── Backend API ──────────────────────────────────
server {
    listen 443 ssl;
    server_name api.maqom.anaslabs.my.id;

    ssl_certificate /etc/letsencrypt/live/maqom.anaslabs.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maqom.anaslabs.my.id/privkey.pem;

    # Allow large audio file uploads (50MB)
    client_max_body_size 50M;

    location / {
        # ── Handle preflight (OPTIONS) at Nginx level ──
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://maqom.anaslabs.my.id' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, X-Session-ID' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://localhost:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # ── Add CORS headers to ALL responses (including errors) ──
        add_header 'Access-Control-Allow-Origin' 'https://maqom.anaslabs.my.id' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }
}
