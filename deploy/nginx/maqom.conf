# ─── Redirect HTTP → HTTPS ─────────────────────────
server {
    listen 80;
    server_name maqom.anaslabs.my.id api.maqom.anaslabs.my.id;
    return 301 https://$host$request_uri;
}

# ─── Frontend (Platform) ──────────────────────────
server {
    listen 443 ssl;
    server_name maqom.anaslabs.my.id;

    ssl_certificate /etc/letsencrypt/live/maqom.anaslabs.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maqom.anaslabs.my.id/privkey.pem;

    location / {
        proxy_pass http://localhost:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── Backend API ──────────────────────────────────
# CORS is handled entirely by Go/Echo — do NOT add CORS headers here
server {
    listen 443 ssl;
    server_name api.maqom.anaslabs.my.id;

    ssl_certificate /etc/letsencrypt/live/maqom.anaslabs.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maqom.anaslabs.my.id/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://localhost:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
